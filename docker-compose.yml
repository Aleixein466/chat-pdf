version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatpdf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatpdf
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chatpdf"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
